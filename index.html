<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absensi SDK St.Yoseph Kuaputu</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

  <div id="global-loader" class="fixed inset-0 w-full h-screen bg-white/90 backdrop-blur-[5px] z-[9999] flex flex-col items-center justify-center gap-4 text-center transition-opacity duration-300">
    <div class="loader-spin"></div>
    <p id="loader-text" class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em]">Menyiapkan Data...</p>
  </div>

  <div id="app" class="flex-1 w-full relative">
    
    <div id="page-login" class="hidden min-h-screen flex items-center justify-center p-4 fade-in">
      <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
        <div class="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
          <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900">SDK St.Yoseph Kuaputu</h1>
        <p class="text-slate-500 mt-2 mb-8 uppercase tracking-widest text-xs font-bold">Sistem Absensi Foto</p>
        <div class="space-y-5 text-left">
          <select id="login-role" class="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none font-medium text-slate-700 border-slate-200 focus:ring-2 focus:ring-emerald-500/20">
            <option value="guru">Guru</option>
            <option value="kepsek">Kepala Sekolah</option>
            <option value="admin">Administrator</option>
          </select>
          <input id="login-id" type="text" placeholder="Masukkan NIP / Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
          <button id="btn-login" onclick="handleLogin()" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">MASUK ABSEN</button>
        </div>
      </div>
    </div>

    <div id="page-guru" class="hidden min-h-screen py-6 px-4 fade-in">
      <div class="max-w-md mx-auto bg-white min-h-[85vh] rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden">
        <header class="p-6 flex items-center justify-between border-b bg-white sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100"><i data-lucide="user" class="w-6 h-6 text-emerald-600"></i></div>
            <div>
                <h2 id="user-name" class="font-bold text-slate-900 leading-tight truncate w-32 uppercase">Memuat...</h2>
                <p id="user-role-label" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">GURU</p>
            </div>
          </div>
          <button onclick="logout()" class="p-3 rounded-2xl bg-red-50 text-red-500 active:scale-90"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>
        
        <main class="flex-1 px-6 pt-6 pb-24 space-y-6">
          <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-6 rounded-[2rem] text-white shadow-xl">
            <p id="current-date" class="font-bold text-emerald-400 text-sm">...</p>
            <h3 class="text-xl font-extrabold mt-1">Halo, Guru Hebat!</h3>
            <div class="mt-4 flex gap-2">
              <span id="status-masuk-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Masuk: -</span>
              <span id="status-pulang-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Pulang: -</span>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-4">
            <div id="upload-progress-container" class="progress-wrapper">
                <div id="upload-progress-bar" class="progress-bar"></div>
            </div>

            <button id="btn-absen-masuk" onclick="triggerUpload('MASUK')" class="p-6 bg-white border-2 border-slate-100 rounded-[2rem] text-left flex justify-between items-center hover:border-emerald-500 transition-all active:scale-95">
              <div><h3 id="txt-masuk" class="font-bold text-slate-900 text-lg">Absen Masuk</h3><p id="label-masuk" class="text-xs text-slate-500 font-medium">Klik untuk upload foto</p></div>
              <div id="icon-masuk" class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center"><i data-lucide="log-in"></i></div>
            </button>
            <button id="btn-absen-pulang" onclick="triggerUpload('PULANG')" class="p-6 bg-white border-2 border-slate-100 rounded-[2rem] text-left flex justify-between items-center hover:border-orange-500 transition-all active:scale-95">
              <div><h3 id="txt-pulang" class="font-bold text-slate-900 text-lg">Absen Pulang</h3><p id="label-pulang" class="text-xs text-slate-500 font-medium">Klik untuk upload foto</p></div>
              <div id="icon-pulang" class="w-12 h-12 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center"><i data-lucide="log-out"></i></div>
            </button>
          </div>

          <input type="file" id="universal-upload" accept="image/*" class="hidden" onchange="processUpload(event)">

          <div class="space-y-4 pt-4 border-t border-slate-100">
            <h3 class="font-bold text-slate-800 flex items-center gap-2 text-lg"><i data-lucide="clock-3" class="w-5 h-5 text-emerald-500"></i> Riwayat Hari Ini</h3>
            <div id="today-log" class="space-y-3"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="page-admin" class="hidden min-h-screen py-8 px-4 fade-in">
        <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 no-print">
              <div><h2 class="text-2xl font-extrabold text-slate-900">Panel Administrator</h2><p class="text-slate-500 text-sm font-medium">Rekapitulasi Absensi</p></div>
              <button onclick="logout()" class="px-5 py-2 bg-red-50 text-red-600 rounded-lg font-bold flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Keluar</button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 no-print">
                <select id="admin-filter-guru" onchange="renderAdminDetail()" class="p-4 bg-white border rounded-2xl outline-none"><option value="">-- Semua Guru --</option></select>
                <select id="admin-filter-bulan" onchange="renderAdminDetail()" class="p-4 bg-white border rounded-2xl outline-none">
                    <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option><option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option><option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>

            <div class="flex justify-end gap-3 mb-4 no-print">
                <button id="btn-reset-data" onclick="handleResetData()" class="px-6 py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg flex items-center gap-2 hover:bg-red-700 transition-all">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Reset Semua Data
                </button>
                <button onclick="window.print()" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg flex items-center gap-2">
                    <i data-lucide="printer" class="w-5 h-5"></i> Cetak Laporan
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead class="bg-slate-50 text-slate-600 border-b">
                            <tr class="text-[11px] font-bold uppercase tracking-wider">
                                <th class="p-4 text-center border-r w-12">No</th>
                                <th class="p-4 border-r">Nama Lengkap</th>
                                <th class="p-4 text-center border-r">Tanggal</th>
                                <th class="p-4 text-center border-r">Masuk</th>
                                <th class="p-4 text-center">Pulang</th>
                            </tr>
                        </thead>
                        <tbody id="table-detail-body" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-success" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs p-8 rounded-[2.5rem] shadow-2xl text-center fade-in">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="badge-check" class="w-10 h-10"></i></div>
            <h3 class="text-2xl font-black text-slate-900">Berhasil!</h3>
            <p class="text-slate-500 mt-2 text-sm leading-relaxed">Data absensi Anda telah disimpan.</p>
            <button onclick="closeModal()" class="w-full mt-6 py-4 bg-emerald-500 text-white font-bold rounded-2xl hover:bg-emerald-600">OK</button>
        </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
