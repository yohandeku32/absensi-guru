<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absensi SDK St.Yoseph Kuaputu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

  <div id="app" class="flex-1 w-full relative">
    
    <div id="page-login" class="min-h-screen flex items-center justify-center p-4 fade-in">
      <div class="w-full max-w-md bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100">
        <div class="text-center mb-10">
          <div class="w-20 h-20 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-emerald-500/20 rotate-3">
            <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
          </div>
          <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">SDK St. Yoseph</h1>
          <p class="text-slate-500 mt-2 font-medium">Sistem Informasi Absensi</p>
        </div>

        <div class="space-y-5">
          <div>
            <label class="text-xs font-bold text-emerald-600 uppercase tracking-wider ml-1">Masuk Sebagai</label>
            <select id="login-role" class="w-full mt-1.5 px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-medium text-lg">
              <option value="guru">Guru / Pegawai</option>
              <option value="kepsek">Kepala Sekolah</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <input id="login-id" type="text" placeholder="Masukkan NIP / Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all placeholder:text-slate-400 font-medium shadow-sm text-lg">
          <button id="btn-login" onclick="handleLogin()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-emerald-500/30 active:scale-[0.98] mt-4 flex justify-center items-center gap-2 text-lg">
            Masuk Sekarang
          </button>
          <p id="login-msg" class="text-center text-red-500 font-medium text-sm hidden">Data Salah</p>
        </div>
      </div>
    </div>

    <div id="page-guru" class="hidden min-h-screen py-6 px-4 fade-in">
      <div class="max-w-md mx-auto bg-white min-h-[85vh] rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 flex flex-col overflow-hidden">
        <header class="p-6 flex items-center justify-between border-b border-slate-100 bg-white sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center border shadow-inner"><i data-lucide="user" class="w-6 h-6 text-emerald-600"></i></div>
            <div><h2 id="user-name" class="font-bold text-slate-900 leading-tight">-</h2><p id="user-role" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Guru / Pegawai</p></div>
          </div>
          <button onclick="logout()" class="p-3 rounded-2xl bg-red-50 text-red-500 active:scale-90 transition-transform"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pt-6 pb-24 space-y-6">
          <div class="bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
            <p id="current-date" class="text-emerald-700 font-extrabold text-lg">Memuat...</p>
            <p class="text-slate-500 text-xs font-medium uppercase tracking-tighter">SDK ST. YOSEPH KUAPUTU</p>
          </div>

          <div id="attendance-options" class="grid grid-cols-1 gap-4">
            <div id="card-masuk" class="p-5 bg-white border-2 border-slate-100 rounded-[2rem] shadow-sm transition-all">
              <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><i data-lucide="log-in" class="w-5 h-5"></i></div>
                  <h3 class="font-bold text-slate-800">Absen Masuk</h3>
                </div>
                <span id="badge-masuk" class="text-[10px] font-bold px-3 py-1 bg-slate-100 text-slate-400 rounded-full uppercase">Belum</span>
              </div>
              <button id="btn-masuk" onclick="triggerUpload('MASUK')" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">Upload Foto Masuk</button>
            </div>

            <div id="card-pulang" class="p-5 bg-white border-2 border-slate-100 rounded-[2rem] shadow-sm transition-all">
              <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600"><i data-lucide="log-out" class="w-5 h-5"></i></div>
                  <h3 class="font-bold text-slate-800">Absen Pulang</h3>
                </div>
                <span id="badge-pulang" class="text-[10px] font-bold px-3 py-1 bg-slate-100 text-slate-400 rounded-full uppercase">Belum</span>
              </div>
              <button id="btn-pulang" onclick="triggerUpload('PULANG')" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg shadow-orange-500/20 active:scale-95 transition-all">Upload Foto Pulang</button>
            </div>
          </div>

          <input type="file" id="universal-upload" accept="image/*" capture="user" class="hidden" onchange="processUpload(event)">

          <div class="space-y-4 pt-4 border-t border-slate-100">
            <h3 class="font-bold text-slate-800 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-emerald-500"></i> Riwayat Hari Ini</h3>
            <div id="today-log" class="space-y-3"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="page-admin" class="hidden min-h-screen py-8 px-4 fade-in">
      <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between bg-white p-6 rounded-[2rem] shadow-lg border">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center"><i data-lucide="shield-check" class="w-7 h-7 text-emerald-600"></i></div>
            <div><h2 id="admin-name" class="text-xl font-black text-slate-900 leading-tight">Panel Admin</h2><p class="text-sm font-bold text-emerald-600">Monitoring Real-time</p></div>
          </div>
          <button onclick="logout()" class="px-6 py-3 rounded-xl bg-red-50 text-red-600 font-bold flex items-center gap-2 mt-4 md:mt-0"><i data-lucide="log-out" class="w-5 h-5"></i> Keluar</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <div class="space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-lg border">
              <h3 class="font-bold text-slate-400 uppercase text-xs mb-4">Statistik</h3>
              <div class="space-y-4">
                <div class="bg-emerald-50 border p-5 rounded-2xl"><p class="text-xs text-emerald-600 font-bold uppercase">Hadir Hari Ini</p><p id="stat-hadir" class="text-4xl font-black text-emerald-700">0</p></div>
                <div class="bg-slate-50 border p-5 rounded-2xl"><p class="text-xs text-slate-500 font-bold uppercase">Total Database</p><p id="stat-total" class="text-4xl font-black text-slate-800">0</p></div>
              </div>
            </div>
            <button onclick="exportToExcel()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all"><i data-lucide="download" class="w-5 h-5"></i> Unduh CSV</button>
            <button onclick="resetData()" id="btn-reset" class="w-full py-4 bg-red-50 text-red-600 font-bold rounded-2xl border border-red-100 hidden">Reset Semua Data</button>
          </div>

          <div class="lg:col-span-3 bg-white p-6 rounded-[2rem] shadow-lg border h-[650px] flex flex-col overflow-hidden">
            <div class="flex justify-between items-center mb-6">
               <h3 class="font-black text-slate-800 text-xl">Data Kehadiran</h3>
               <button onclick="refreshAdmin(event)" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold flex items-center gap-2 active:scale-90 transition-all"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Segarkan</button>
            </div>
            <div class="flex-1 overflow-auto rounded-2xl border bg-slate-50">
              <table class="w-full text-left min-w-[700px]">
                <thead class="bg-slate-100 sticky top-0 font-bold text-[10px] uppercase text-slate-500 z-10">
                  <tr><th class="p-4">No</th><th class="p-4">Nama</th><th class="p-4">Tanggal / Jam</th><th class="p-4">Status</th><th class="p-4">Foto</th></tr>
                </thead>
                <tbody id="admin-table-body" class="divide-y bg-white"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxqlhMHviBkUnn-HtpRBN5-1mfF2zzsR4RlSE-_9nHlcOdHXz2Rc57OEGKcH8igLjtgA/exec";

    const MASTER_USERS = [
      { id: 'admin', name: 'Admin Sistem', role: 'admin' },
      { id: '100', name: 'Wilhelmina Kasih, S.Ag,S.Pd', role: 'kepsek' },
      { id: '101', name: 'Ambrosius Sina, S.Pd', role: 'guru' },
      { id: '102', name: 'Trifosa Rabe, S.Pd', role: 'guru' },
      { id: '103', name: 'Priska Oni, S.Pd', role: 'guru' },
      { id: '104', name: 'Flavianus V. Tumpung, S.Pd', role: 'guru' },
      { id: '105', name: 'Maria Junista Menge, S.Pd', role: 'guru' },
      { id: '106', name: 'Novi Mariana Loinati, S.Pd', role: 'guru' },
      { id: '107', name: 'Maria Yunita Lanus, S.Pd', role: 'guru' },
      { id: '108', name: 'Yohana Yusarli Nenobesi, S.Pd', role: 'guru' },
      { id: '109', name: 'Stefanus Leli, S.Pd', role: 'guru' },
      { id: '110', name: 'Yohanes Ignasius T. Deku (TU)', role: 'pegawai' },
    ];

    let currentUser = null;
    let globalDatabase = [];
    let currentStatusMode = '';

    function getTodayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    async function handleLogin() {
      const role = document.getElementById('login-role').value;
      const id = document.getElementById('login-id').value.trim();
      const user = MASTER_USERS.find(u => String(u.id) === String(id) && u.role === role);

      if (user) {
        currentUser = user;
        document.getElementById('btn-login').disabled = true;
        document.getElementById('login-msg').classList.remove('hidden');
        document.getElementById('login-msg').textContent = 'Menghubungkan...';
        
        await fetchDatabase();

        if (user.role === 'admin' || user.role === 'kepsek') {
          showPage('page-admin'); renderAdminDashboard();
        } else {
          showPage('page-guru'); renderGuruDashboard();
        }
      } else {
        alert("NIP atau Role tidak sesuai!");
      }
    }

    async function fetchDatabase() {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now());
        globalDatabase = await response.json();
      } catch (e) { console.error("Database error", e); }
    }

    function showPage(id) {
      document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      lucide.createIcons();
    }

    function logout() { location.reload(); }

    function renderGuruDashboard() {
      document.getElementById('user-name').textContent = currentUser.name;
      const today = getTodayString();
      document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      
      const logs = globalDatabase.filter(a => String(a.id_user) === String(currentUser.id) && a.date === today);
      const hasMasuk = logs.find(l => l.status === 'MASUK');
      const hasPulang = logs.find(l => l.status === 'PULANG');

      // Update Card Masuk
      if (hasMasuk) {
        document.getElementById('badge-masuk').innerText = "SUDAH";
        document.getElementById('badge-masuk').className = "text-[10px] font-bold px-3 py-1 bg-emerald-100 text-emerald-600 rounded-full uppercase";
        document.getElementById('btn-masuk').className = "w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold cursor-not-allowed";
        document.getElementById('btn-masuk').disabled = true;
        document.getElementById('btn-masuk').innerText = "Sudah Absen Masuk";
      }

      // Update Card Pulang
      if (hasPulang) {
        document.getElementById('badge-pulang').innerText = "SUDAH";
        document.getElementById('badge-pulang').className = "text-[10px] font-bold px-3 py-1 bg-orange-100 text-orange-600 rounded-full uppercase";
        document.getElementById('btn-pulang').className = "w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold cursor-not-allowed";
        document.getElementById('btn-pulang').disabled = true;
        document.getElementById('btn-pulang').innerText = "Sudah Absen Pulang";
      }

      // Riwayat List
      const list = document.getElementById('today-log');
      list.innerHTML = logs.length ? logs.map(l => `
        <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl flex justify-between items-center">
          <div><p class="font-bold text-slate-800">${l.status}</p><p class="text-[10px] text-slate-500 font-medium">${l.time}</p></div>
          <i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>
        </div>
      `).join('') : '<p class="text-center text-slate-400 text-sm py-4 italic">Belum ada absen hari ini</p>';
      lucide.createIcons();
    }

    function triggerUpload(mode) {
      currentStatusMode = mode;
      document.getElementById('universal-upload').click();
    }

    async function processUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const btn = currentStatusMode === 'MASUK' ? document.getElementById('btn-masuk') : document.getElementById('btn-pulang');
      const originalText = btn.innerText;
      btn.innerText = "Mengunci GPS & Foto...";
      btn.disabled = true;
      document.getElementById('app').style.opacity = "0.6";

      // 1. Ambil Lokasi GPS
      let lokasiTeks = "GPS Tidak Aktif";
      try {
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000}));
        lokasiTeks = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
      } catch (e) { alert("GPS tidak ditemukan. Absen dilanjutkan tanpa koordinat."); }

      // 2. Olah Gambar + Watermark
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const MAX_WIDTH = 600;
          canvas.width = MAX_WIDTH;
          canvas.height = img.height * (MAX_WIDTH / img.width);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          // Watermark Design
          const tgl = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
          const jam = new Date().toLocaleTimeString('id-ID');
          const watermark = `${tgl} | ${jam} | ${currentStatusMode} | ${lokasiTeks}`;

          ctx.font = "bold 18px Arial";
          ctx.shadowColor = "black"; ctx.shadowBlur = 6;
          ctx.fillStyle = "white";
          ctx.fillText(watermark, 20, canvas.height - 20);

          // 3. Kirim ke Server
          const payload = {
            id_user: String(currentUser.id),
            name: currentUser.name,
            date: getTodayString(),
            time: jam,
            status: currentStatusMode,
            note: "Lokasi: http://maps.google.com/?q=" + lokasiTeks,
            photo: canvas.toDataURL('image/jpeg', 0.7)
          };

          fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(() => {
              alert(`Absen ${currentStatusMode} Berhasil!`);
              location.reload();
            })
            .catch(() => {
              alert("Koneksi gagal, silakan coba lagi.");
              btn.innerText = originalText;
              btn.disabled = false;
              document.getElementById('app').style.opacity = "1";
            });
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function renderAdminDashboard() {
      document.getElementById('btn-reset').classList.toggle('hidden', currentUser.role !== 'admin');
      const today = getTodayString();
      document.getElementById('stat-hadir').textContent = globalDatabase.filter(a => a.date === today && a.status === 'MASUK').length;
      document.getElementById('stat-total').textContent = globalDatabase.length;
      
      const tbody = document.getElementById('admin-table-body');
      tbody.innerHTML = [...globalDatabase].reverse().map((a, i) => `
        <tr>
          <td class="p-4 text-[10px] font-bold text-slate-400">${globalDatabase.length - i}</td>
          <td class="p-4 font-bold text-slate-800 text-sm leading-tight">${a.name}</td>
          <td class="p-4"><p class="text-xs font-bold">${a.date}</p><p class="text-[10px] text-slate-400">${a.time}</p></td>
          <td class="p-4"><span class="px-2 py-1 ${a.status === 'MASUK' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'} rounded-lg text-[10px] font-black">${a.status}</span></td>
          <td class="p-4 text-xs font-bold text-blue-500"><a href="${a.photo_url || '#'}" target="_blank" class="flex items-center gap-1">Lihat <i data-lucide="external-link" class="w-3 h-3"></i></a></td>
        </tr>
      `).join('');
      lucide.createIcons();
    }

    async function refreshAdmin(e) { e.target.disabled = true; await fetchDatabase(); renderAdminDashboard(); e.target.disabled = false; }

    function exportToExcel() {
      let csv = "Nama,Tanggal,Jam,Status,Note,Link Foto\n";
      globalDatabase.forEach(r => csv += `"${r.name}","${r.date}","${r.time}","${r.status}","${r.note}","${r.photo_url}"\n`);
      const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'data_absensi.csv'; a.click();
    }

    async function resetData() {
      if (confirm("Hapus seluruh database? Tindakan ini tidak bisa dibatalkan.")) {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'clear' }) });
        location.reload();
      }
    }

    lucide.createIcons();
  </script>
</body>
</html>
