<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absensi SDK St.Yoseph Kuaputu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none; }
    .toast { animation: slideIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; pointer-events: auto; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

  <div id="toast-container"></div>

  <div id="app" class="flex-1 w-full relative">
    
    <div id="page-login" class="min-h-screen flex items-center justify-center p-4 fade-in">
      <div class="w-full max-w-md bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 text-center">
        <div class="w-20 h-20 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl rotate-3">
          <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">SDK St. Yoseph</h1>
        <p class="text-slate-500 mt-2 font-medium mb-8">Sistem Informasi Absensi</p>

        <div class="space-y-5 text-left">
          <div>
            <label class="text-xs font-bold text-emerald-600 uppercase tracking-wider ml-1">Masuk Sebagai</label>
            <select id="login-role" class="w-full mt-1.5 px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-medium">
              <option value="guru">Guru / Pegawai</option>
              <option value="kepsek">Kepala Sekolah</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <input id="login-id" type="text" placeholder="Masukkan NIP / Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all placeholder:text-slate-400 font-medium">
          <button id="btn-login" onclick="handleLogin()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/30 active:scale-[0.98] mt-4 flex justify-center items-center gap-2">
            Masuk Sekarang
          </button>
        </div>
      </div>
    </div>

    <div id="page-guru" class="hidden min-h-screen py-6 px-4 fade-in">
      <div class="max-w-md mx-auto bg-white min-h-[85vh] rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden">
        <header class="p-6 flex items-center justify-between border-b border-slate-50 bg-white sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100"><i data-lucide="user" class="w-6 h-6 text-emerald-600"></i></div>
            <div>
                <h2 id="user-name" class="font-bold text-slate-900 leading-tight truncate w-32">Memuat...</h2>
                <p id="user-role-label" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">GURU / PEGAWAI</p>
            </div>
          </div>
          <button onclick="logout()" class="p-3 rounded-2xl bg-red-50 text-red-500 active:scale-90 transition-transform"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pt-6 pb-24 space-y-6">
          <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-6 rounded-[2rem] text-white shadow-xl">
            <p id="current-date" class="font-bold text-emerald-400 text-sm">Memuat...</p>
            <h3 class="text-xl font-extrabold mt-1">Halo, Selamat Bekerja!</h3>
            <div class="mt-4 flex gap-2">
              <span id="status-masuk-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Masuk: -</span>
              <span id="status-pulang-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Pulang: -</span>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-4">
            <button id="btn-absen-masuk" onclick="triggerUpload('MASUK')" class="group p-6 bg-white border-2 border-slate-100 rounded-[2rem] transition-all hover:border-emerald-500 active:scale-95 text-left relative">
              <div class="flex justify-between items-center w-full">
                <div>
                  <h3 class="font-bold text-slate-900 text-lg">Absen Masuk</h3>
                  <p id="label-masuk" class="text-xs text-slate-500 font-medium">Klik untuk upload foto</p>
                </div>
                <div id="icon-masuk" class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center">
                  <i data-lucide="log-in" class="w-6 h-6"></i>
                </div>
              </div>
            </button>

            <button id="btn-absen-pulang" onclick="triggerUpload('PULANG')" class="group p-6 bg-white border-2 border-slate-100 rounded-[2rem] transition-all hover:border-orange-500 active:scale-95 text-left relative">
              <div class="flex justify-between items-center w-full">
                <div>
                  <h3 class="font-bold text-slate-900 text-lg">Absen Pulang</h3>
                  <p id="label-pulang" class="text-xs text-slate-500 font-medium">Klik untuk upload foto</p>
                </div>
                <div id="icon-pulang" class="w-12 h-12 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center">
                  <i data-lucide="log-out" class="w-6 h-6"></i>
                </div>
              </div>
            </button>
          </div>

          <input type="file" id="universal-upload" accept="image/*" class="hidden" onchange="processUpload(event)">

          <div class="space-y-4 pt-4 border-t border-slate-100">
            <h3 class="font-bold text-slate-800 flex items-center gap-2 text-lg"><i data-lucide="clock-3" class="w-5 h-5 text-emerald-500"></i> Riwayat Hari Ini</h3>
            <div id="today-log" class="space-y-3"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="page-admin" class="hidden min-h-screen py-8 px-4 fade-in">
        <div class="max-w-4xl mx-auto">
            <button onclick="logout()" class="mb-4 px-4 py-2 bg-slate-800 text-white rounded-lg font-bold">Logout Admin</button>
            <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100">
                <h2 class="text-2xl font-bold mb-4">Dashboard Monitoring</h2>
                <p class="text-slate-500">Data absensi (Khusus Admin).</p>
            </div>
        </div>
    </div>
  </div>

  <script>
    // URL SCRIPT GOOGLE ANDA
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxqlhMHviBkUnn-HtpRBN5-1mfF2zzsR4RlSE-_9nHlcOdHXz2Rc57OEGKcH8igLjtgA/exec";

    const MASTER_USERS = [
      { id: 'admin', name: 'Admin Sistem', role: 'admin' },
      { id: '100', name: 'Wilhelmina Kasih, S.Ag,S.Pd', role: 'kepsek' },
      { id: '101', name: 'Ambrosius Sina, S.Pd', role: 'guru' },
      { id: '102', name: 'Trifosa Rabe, S.Pd', role: 'guru' },
      { id: '103', name: 'Priska Oni, S.Pd', role: 'guru' },
      { id: '104', name: 'Flavianus V. Tumpung, S.Pd', role: 'guru' },
      { id: '105', name: 'Maria Junista Menge, S.Pd', role: 'guru' },
      { id: '106', name: 'Novi Mariana Loinati, S.Pd', role: 'guru' },
      { id: '107', name: 'Maria Yunita Lanus, S.Pd', role: 'guru' },
      { id: '108', name: 'Yohana Yusarli Nenobesi, S.Pd', role: 'guru' },
      { id: '109', name: 'Stefanus Leli, S.Pd', role: 'guru' },
      { id: '110', name: 'Yohanes Ignasius T. Deku (TU)', role: 'pegawai' },
    ];

    let currentUser = null;
    let globalDatabase = [];
    let currentMode = '';

    function showToast(title, message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const color = type === 'success' ? 'emerald' : 'red';
      const icon = type === 'success' ? 'check-circle' : 'alert-circle';
      toast.className = `toast w-72 bg-white border-l-4 border-${color}-500 shadow-2xl rounded-xl p-4 mb-4 flex items-start gap-3`;
      toast.innerHTML = `<div class="text-${color}-500"><i data-lucide="${icon}" class="w-6 h-6"></i></div><div><p class="font-bold text-slate-900 text-sm">${title}</p><p class="text-xs text-slate-500 font-medium">${message}</p></div>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => { 
          toast.style.animation = 'slideOut 0.5s forwards'; 
          setTimeout(() => toast.remove(), 500); 
      }, 4000);
    }

    function getTodayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    async function fetchDatabase() {
      try {
        const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now());
        const data = await res.json();
        globalDatabase = Array.isArray(data) ? data : [];
        return true;
      } catch (e) {
        console.log("Belum ada data atau fungsi doGet belum diaktifkan di App Script.");
        return false;
      }
    }

    async function handleLogin() {
      const idInput = document.getElementById('login-id').value.trim();
      const roleInput = document.getElementById('login-role').value;
      const user = MASTER_USERS.find(u => String(u.id) === idInput && u.role === roleInput);

      if (!user) {
        showToast('Gagal Masuk', 'ID atau Peran tidak sesuai.', 'error');
        return;
      }

      const btn = document.getElementById('btn-login');
      btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Memverifikasi...`;
      btn.disabled = true;
      lucide.createIcons();

      currentUser = user;
      await fetchDatabase();
      
      if (user.role === 'admin' || user.role === 'kepsek') {
        showPage('page-admin');
      } else {
        showPage('page-guru');
        renderGuruDashboard();
      }
      showToast('Berhasil', `Selamat datang, ${user.name}`);
    }

    function showPage(id) {
      document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      lucide.createIcons();
    }

    function renderGuruDashboard() {
      if (!currentUser) return;
      
      // Update Profil Header
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
      
      const today = getTodayString();
      
      // Pencarian Riwayat Hari Ini (Toleransi terhadap format tanggal Google Sheets)
      const myLogs = globalDatabase.filter(a => {
         const isUser = String(a.id_user) === String(currentUser.id);
         const isToday = String(a.date).includes(today);
         return isUser && isToday;
      });
      
      const hasMasuk = myLogs.find(l => l.status === 'MASUK');
      const hasPulang = myLogs.find(l => l.status === 'PULANG');

      updateButtonVisual('masuk', hasMasuk);
      updateButtonVisual('pulang', hasPulang);

      const logContainer = document.getElementById('today-log');
      if (myLogs.length > 0) {
        logContainer.innerHTML = myLogs.map(l => `
          <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 fade-in">
            <div class="w-10 h-10 rounded-xl ${l.status === 'MASUK' ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'} flex items-center justify-center font-bold text-xs">${l.status[0]}</div>
            <div class="flex-1">
              <p class="font-bold text-slate-800 text-sm">Absen ${l.status}</p>
              <p class="text-[10px] text-slate-400 font-bold uppercase">${l.time}</p>
            </div>
            <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500"></i>
          </div>
        `).join('');
      } else {
        logContainer.innerHTML = `<p class="text-center text-slate-400 text-sm italic py-4">Belum ada riwayat hari ini</p>`;
      }
      lucide.createIcons();
    }

    function updateButtonVisual(type, data) {
      const btn = document.getElementById(`btn-absen-${type}`);
      const label = document.getElementById(`label-${type}`);
      const icon = document.getElementById(`icon-${type}`);
      const pill = document.getElementById(`status-${type}-pill`);

      // Safety Guard agar tidak error jika elemen tidak ditemukan
      if (!btn || !label || !icon || !pill) return;

      if (data) {
        btn.disabled = true;
        btn.className = "group p-6 bg-slate-50 border-2 border-slate-100 rounded-[2rem] opacity-70 text-left cursor-not-allowed";
        label.innerHTML = `<span class="text-emerald-600 font-bold">Sudah Absen (${data.time})</span>`;
        icon.className = "w-12 h-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg";
        icon.innerHTML = `<i data-lucide="check" class="w-6 h-6"></i>`;
        
        pill.textContent = `${type.toUpperCase()}: ${data.time}`;
        pill.className = "px-3 py-1 bg-emerald-500/20 text-emerald-500 rounded-full text-[10px] font-bold border border-emerald-500/20 uppercase";
      } else {
        btn.disabled = false;
        btn.className = `group p-6 bg-white border-2 border-slate-100 rounded-[2rem] transition-all hover:border-${type === 'masuk' ? 'emerald' : 'orange'}-500 active:scale-95 text-left`;
        label.innerText = "Klik untuk upload foto";
        icon.className = `w-12 h-12 ${type === 'masuk' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'} rounded-2xl flex items-center justify-center`;
        icon.innerHTML = `<i data-lucide="${type === 'masuk' ? 'log-in' : 'log-out'}" class="w-6 h-6"></i>`;
        
        pill.textContent = `${type.toUpperCase()}: -`;
        pill.className = "px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase";
      }
      lucide.createIcons();
    }

    function triggerUpload(mode) {
      currentMode = mode;
      document.getElementById('universal-upload').click();
    }

    async function processUpload(event) {
      const file = event.target.files[0];
      if (!file || !currentUser) return;

      const typeLower = currentMode.toLowerCase();
      const btn = document.getElementById(`btn-absen-${typeLower}`);
      const label = document.getElementById(`label-${typeLower}`);
      const icon = document.getElementById(`icon-${typeLower}`);
      
      const oldLabel = label.innerHTML;
      const oldIcon = icon.innerHTML;
      
      // PERBAIKAN BUG: Ubah teks tanpa menghancurkan elemen ID
      btn.disabled = true;
      label.innerHTML = `<span class="text-emerald-500 font-bold">Mengirim data...</span>`;
      icon.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin text-emerald-500"></i>`;
      lucide.createIcons();

      const reader = new FileReader();
      reader.onload = async function(e) {
        const payload = {
          id_user: String(currentUser.id),
          name: currentUser.name,
          date: getTodayString(),
          time: new Date().toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit' }),
          status: currentMode,
          photo: e.target.result
        };

        try {
          await fetch(GOOGLE_SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors',
            body: JSON.stringify(payload) 
          });

          showToast('Berhasil', `Absen ${currentMode} terkirim.`);
          
          setTimeout(async () => {
              await fetchDatabase();
              renderGuruDashboard();
          }, 1500);

        } catch (err) {
          showToast('Error', 'Gagal koneksi ke server.', 'error');
          // Jika gagal, kembalikan ke awal
          label.innerHTML = oldLabel;
          icon.innerHTML = oldIcon;
          btn.disabled = false;
          lucide.createIcons();
        }
      };
      reader.readAsDataURL(file);
      event.target.value = ''; 
    }

    function logout() { location.reload(); }
    lucide.createIcons();
  </script>
</body>
</html>
