<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absensi SDK St.Yoseph Kuaputu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

  <div id="app" class="flex-1 w-full relative">
    
    <div id="page-login" class="min-h-screen flex items-center justify-center p-4 fade-in">
      <div class="w-full max-w-md bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100">
        <div class="text-center mb-10">
          <div class="w-20 h-20 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-emerald-500/20 rotate-3">
            <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
          </div>
          <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">SDK St. Yoseph</h1>
          <p class="text-slate-500 mt-2 font-medium">Sistem Informasi Absensi</p>
        </div>

        <div class="space-y-5">
          <div>
            <label class="text-xs font-bold text-emerald-600 uppercase tracking-wider ml-1">Masuk Sebagai</label>
            <select id="login-role" class="w-full mt-1.5 px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-medium">
              <option value="guru">Guru / Pegawai</option>
              <option value="kepsek">Kepala Sekolah</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <input id="login-id" type="text" placeholder="Masukkan NIP / Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all placeholder:text-slate-400 font-medium shadow-sm">
          <button id="btn-login" onclick="handleLogin()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-emerald-500/30 active:scale-[0.98] mt-4 flex justify-center items-center gap-2">
            Masuk Sekarang
          </button>
          <p id="login-msg" class="text-center text-red-500 font-medium text-sm hidden">Data Salah</p>
        </div>
      </div>
    </div>

    <div id="page-guru" class="hidden min-h-screen py-6 px-4 fade-in">
      <div class="max-w-md mx-auto bg-white min-h-[85vh] rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 flex flex-col overflow-hidden">
        <header class="p-6 flex items-center justify-between border-b border-slate-100 bg-white sticky top-0">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center border shadow-inner"><i data-lucide="user" class="w-6 h-6 text-emerald-600"></i></div>
            <div><h2 id="user-name" class="font-bold text-slate-900 leading-tight">-</h2><p id="user-role" class="text-xs font-bold text-slate-500">Guru</p></div>
          </div>
          <button onclick="logout()" class="p-3 rounded-2xl bg-red-50 text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pt-6 pb-24 space-y-6">
          <div class="bg-slate-50 p-5 rounded-[2rem] flex items-center justify-between border border-slate-100">
            <div><p id="current-date" class="text-emerald-700 font-extrabold text-lg">Memuat...</p><p class="text-slate-500 text-xs font-medium">Status Anda hari ini:</p></div>
            <div id="status-badge" class="px-3 py-1.5 bg-slate-200 rounded-full text-[10px] font-bold uppercase text-slate-500">Belum Absen</div>
          </div>

          <div id="action-buttons" class="grid grid-cols-1 gap-3 hidden">
            <button id="btn-hadir" onclick="document.getElementById('camera-input').click()" class="p-6 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-[2rem] text-left transition-all active:scale-95 shadow-xl shadow-emerald-500/20">
              <i data-lucide="camera" class="w-8 h-8 text-white/80 mb-2"></i>
              <h3 class="text-white font-bold text-xl">Hadir & Foto Selfie</h3>
              <p class="text-emerald-50 text-xs font-medium mt-1">Klik untuk buka kamera</p>
            </button>
            <input type="file" id="camera-input" accept="image/*" capture="user" class="hidden" onchange="processPhotoAndSubmit(event)">
            <div class="grid grid-cols-2 gap-3">
              <button onclick="openNote('IZIN')" class="p-4 bg-white rounded-[1.5rem] border shadow-sm"><i data-lucide="mail" class="w-6 h-6 text-amber-500 mb-2"></i><p class="text-slate-800 font-bold">Izin</p></button>
              <button onclick="openNote('SAKIT')" class="p-4 bg-white rounded-[1.5rem] border shadow-sm"><i data-lucide="thermometer" class="w-6 h-6 text-blue-500 mb-2"></i><p class="text-slate-800 font-bold">Sakit</p></button>
            </div>
          </div>

          <div id="action-success" class="hidden bg-emerald-50 p-8 rounded-[2rem] text-center border border-emerald-100">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check" class="text-emerald-600 w-8 h-8"></i></div>
            <p class="text-emerald-800 font-extrabold text-xl">Sudah Absen!</p>
          </div>

          <div class="space-y-4 pt-4 border-t border-slate-100">
            <h3 class="font-bold text-slate-800 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-emerald-500"></i> Riwayat</h3>
            <div id="guru-history-list" class="space-y-3"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="page-admin" class="hidden min-h-screen py-8 px-4 fade-in">
      <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between bg-white p-6 rounded-[2rem] shadow-lg border">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center"><i data-lucide="shield-check" class="w-7 h-7 text-emerald-600"></i></div>
            <div><h2 id="admin-name" class="text-xl font-black text-slate-900 leading-tight">Panel Admin</h2><p id="admin-subrole" class="text-sm font-bold text-emerald-600">Administrator System</p></div>
          </div>
          <button onclick="logout()" class="px-6 py-3 rounded-xl bg-red-50 text-red-600 font-bold flex items-center gap-2 mt-4 md:mt-0"><i data-lucide="log-out" class="w-5 h-5"></i> Keluar</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <div class="space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-lg border">
              <h3 class="font-bold text-slate-400 uppercase text-xs mb-4">Statistik</h3>
              <div class="space-y-4">
                <div class="bg-emerald-50 border p-5 rounded-2xl"><p class="text-xs text-emerald-600 font-bold">HADIR HARI INI</p><p id="stat-hadir" class="text-4xl font-black text-emerald-700">0</p></div>
                <div class="bg-slate-50 border p-5 rounded-2xl"><p class="text-xs text-slate-500 font-bold">TOTAL DATA</p><p id="stat-total" class="text-4xl font-black text-slate-800">0</p></div>
              </div>
            </div>
            <div class="space-y-3">
              <button onclick="exportToExcel()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg flex items-center justify-center gap-2"><i data-lucide="download" class="w-5 h-5"></i> Unduh CSV</button>
              <button onclick="resetData()" id="btn-reset" class="w-full py-4 bg-red-50 text-red-600 font-bold rounded-2xl border border-red-100 hidden">Reset Semua Data</button>
            </div>
          </div>

          <div class="lg:col-span-3 bg-white p-6 rounded-[2rem] shadow-lg border h-[600px] flex flex-col">
            <div class="flex justify-between items-center mb-6">
               <h3 class="font-black text-slate-800 text-xl">Data Kehadiran</h3>
               <button onclick="refreshAdmin(event)" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold flex items-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Segarkan</button>
            </div>
            <div class="flex-1 overflow-auto rounded-2xl border bg-slate-50">
              <table class="w-full text-left min-w-[600px]">
                <thead class="bg-slate-100 sticky top-0 font-bold text-xs uppercase text-slate-500">
                  <tr><th class="p-4">No</th><th class="p-4">Nama</th><th class="p-4">Waktu</th><th class="p-4">Status</th><th class="p-4">Keterangan</th></tr>
                </thead>
                <tbody id="admin-table-body" class="divide-y bg-white"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="modal-note" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
        <h3 id="modal-title" class="text-xl font-black mb-6">Keterangan</h3>
        <textarea id="note-text" class="w-full h-32 bg-slate-50 border rounded-2xl p-4 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Tulis alasan..."></textarea>
        <div class="flex gap-3 mt-6">
          <button onclick="closeNote()" class="flex-1 py-4 font-bold text-slate-400 bg-slate-100 rounded-2xl">Batal</button>
          <button onclick="confirmAbsenWithNote()" class="flex-1 py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">Kirim</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // === GANTI URL INI ===
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxqlhMHviBkUnn-HtpRBN5-1mfF2zzsR4RlSE-_9nHlcOdHXz2Rc57OEGKcH8igLjtgA/exec";

    const MASTER_USERS = [
      { id: 'admin', name: 'Admin Sistem', role: 'admin' },
      { id: '100', name: 'Wilhelmina Kasih, S.Ag,S.Pd', role: 'kepsek' },
      { id: '101', name: 'Ambrosius Sina, S.Pd', role: 'guru' },
      { id: '102', name: 'Trifosa Rabe, S.Pd', role: 'guru' },
      { id: '103', name: 'Priska Oni, S.Pd', role: 'guru' },
      { id: '104', name: 'Flavianus V. Tumpung, S.Pd', role: 'guru' },
      { id: '105', name: 'Maria Junista Menge, S.Pd', role: 'guru' },
      { id: '106', name: 'Novi Mariana Loinati, S.Pd', role: 'guru' },
      { id: '107', name: 'Maria Yunita Lanus, S.Pd', role: 'guru' },
      { id: '108', name: 'Yohana Yusarli Nenobesi, S.Pd', role: 'guru' },
      { id: '109', name: 'Stefanus Leli, S.Pd', role: 'guru' },
      { id: '110', name: 'Yohanes Ignasius T. Deku (TU)', role: 'pegawai' },
    ];

    let currentUser = null;
    let pendingStatus = '';
    let globalDatabase = [];

    function getTodayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    async function handleLogin() {
      const role = document.getElementById('login-role').value;
      const id = document.getElementById('login-id').value.trim();
      const user = MASTER_USERS.find(u => String(u.id) === String(id) && u.role === role);

      if (user) {
        currentUser = user;
        document.getElementById('btn-login').disabled = true;
        document.getElementById('login-msg').classList.remove('hidden');
        document.getElementById('login-msg').textContent = 'Sinkronisasi...';
        
        await fetchDatabase();

        if (user.role === 'kepsek') {
          const today = getTodayString();
          const hasAbsen = globalDatabase.find(a => String(a.id_user) === String(user.id) && a.date === today);
          if (!hasAbsen) {
            const newAbsen = { id_user: String(user.id), name: user.name, date: today, time: new Date().toLocaleTimeString('id-ID'), status: 'HADIR', note: 'Login Otomatis Kepsek' };
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(newAbsen) }).catch(e => console.log("Silent error"));
            globalDatabase.push(newAbsen);
          }
        }

        if (user.role === 'admin' || user.role === 'kepsek') {
          showPage('page-admin'); renderAdminDashboard();
        } else {
          showPage('page-guru'); renderGuruDashboard();
        }
      } else {
        alert("Data tidak ditemukan!");
      }
    }

    async function fetchDatabase() {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now());
        globalDatabase = await response.json();
      } catch (e) { console.error("Fetch error", e); }
    }

    function showPage(id) {
      document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      lucide.createIcons();
    }

    function logout() { location.reload(); }

    function renderGuruDashboard() {
      document.getElementById('user-name').textContent = currentUser.name;
      const today = getTodayString();
      document.getElementById('current-date').textContent = today;
      const hasAbsen = globalDatabase.find(a => String(a.id_user) === String(currentUser.id) && a.date === today);

      if (hasAbsen) {
        document.getElementById('status-badge').textContent = hasAbsen.status;
        document.getElementById('action-buttons').classList.add('hidden');
        document.getElementById('action-success').classList.remove('hidden');
      } else {
        document.getElementById('action-buttons').classList.remove('hidden');
        document.getElementById('action-success').classList.add('hidden');
      }

      const list = document.getElementById('guru-history-list');
      list.innerHTML = '';
      globalDatabase.filter(a => String(a.id_user) === String(currentUser.id)).reverse().slice(0, 5).forEach(h => {
        list.innerHTML += `<div class="p-4 bg-white border rounded-2xl flex justify-between"><div><p class="font-bold">${h.date}</p><p class="text-xs">${h.status} - ${h.time}</p></div></div>`;
      });
      lucide.createIcons();
    }

    async function processPhotoAndSubmit(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (event) => {
        const img = new Image();
        img.onload = async () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = 400; canvas.height = img.height * (400/img.width);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          submitAbsen('HADIR', 'Hadir dengan Foto', canvas.toDataURL('image/jpeg', 0.6));
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    async function submitAbsen(status, note = '', photo = '') {
      const data = { id_user: String(currentUser.id), name: currentUser.name, date: getTodayString(), time: new Date().toLocaleTimeString('id-ID'), status, note, photo };
      document.getElementById('app').style.opacity = "0.5";
      try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        globalDatabase.push(data);
        renderGuruDashboard();
      } catch (e) { alert("Data terkirim, mohon cek riwayat."); }
      document.getElementById('app').style.opacity = "1";
    }

    function openNote(s) { pendingStatus = s; document.getElementById('modal-note').classList.remove('hidden'); }
    function closeNote() { document.getElementById('modal-note').classList.add('hidden'); }
    function confirmAbsenWithNote() { submitAbsen(pendingStatus, document.getElementById('note-text').value); closeNote(); }

    function renderAdminDashboard() {
      document.getElementById('btn-reset').classList.toggle('hidden', currentUser.role !== 'admin');
      const today = getTodayString();
      document.getElementById('stat-hadir').textContent = globalDatabase.filter(a => a.date === today && a.status === 'HADIR').length;
      document.getElementById('stat-total').textContent = globalDatabase.length;
      const tbody = document.getElementById('admin-table-body');
      tbody.innerHTML = '';
      [...globalDatabase].reverse().forEach((a, i) => {
        tbody.innerHTML += `<tr><td class="p-4 text-xs font-bold">${i+1}</td><td class="p-4 font-bold">${a.name}</td><td class="p-4 text-xs">${a.date} ${a.time}</td><td class="p-4 font-black">${a.status}</td><td class="p-4 text-xs">${a.note || '-'}</td></tr>`;
      });
    }

    async function refreshAdmin(e) { e.target.disabled = true; await fetchDatabase(); renderAdminDashboard(); e.target.disabled = false; lucide.createIcons(); }

    async function resetData() {
      if (!confirm("Hapus semua data?")) return;
      await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'clear' }) });
      location.reload();
    }

    function exportToExcel() {
      let csv = "Nama,Tanggal,Jam,Status,Note\n";
      globalDatabase.forEach(r => csv += `"${r.name}","${r.date}","${r.time}","${r.status}","${r.note}"\n`);
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'absen.csv'; a.click();
    }

    lucide.createIcons();
  </script>
</body>
</html>
