<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absensi SDK St.Yoseph Kuaputu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media print { .no-print { display: none !important; } .show-on-print { display: block !important; } }
    .show-on-print { display: none; }
    .img-preview-admin { width: 60px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 4px; }
  </style>
</head>
<body class="text-slate-800 min-h-screen">

  <div id="app" class="w-full relative">
    
    <div id="page-login" class="hidden min-h-screen flex items-center justify-center p-4 fade-in">
      <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-3xl font-extrabold text-slate-900">SDK St. Yoseph</h1>
        <div class="space-y-5 mt-8 text-left">
          <select id="login-role" class="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none"><option value="guru">Guru / Pegawai</option><option value="kepsek">Kepala Sekolah</option><option value="admin">Administrator</option></select>
          <input id="login-id" type="text" placeholder="Masukkan NIP / Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
          <button onclick="handleLogin()" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-2xl shadow-lg">MASUK SISTEM</button>
        </div>
      </div>
    </div>

    <div id="page-guru" class="hidden min-h-screen py-6 px-4 fade-in">
      <div class="max-w-md mx-auto bg-white min-h-[85vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
        <header class="p-6 flex items-center justify-between border-b bg-white sticky top-0 z-10">
          <h2 id="user-name" class="font-bold text-slate-900 uppercase">Memuat...</h2>
          <button onclick="logout()" class="p-3 rounded-2xl bg-red-50 text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>
        <main class="flex-1 px-6 pt-6 pb-24 space-y-6">
          <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-6 rounded-[2rem] text-white shadow-xl">
            <p id="current-date" class="font-bold text-emerald-400 text-sm">...</p>
            <div class="mt-4 flex gap-2">
              <span id="status-masuk-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Masuk: -</span>
              <span id="status-pulang-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Pulang: -</span>
            </div>
          </div>
          <div class="grid grid-cols-1 gap-4">
            <button id="btn-absen-masuk" onclick="triggerUpload('MASUK')" class="p-6 bg-white border-2 border-slate-100 rounded-[2rem] flex justify-between items-center">
                <span id="txt-masuk" class="font-bold">Absen Masuk</span><i data-lucide="log-in" class="text-emerald-500"></i>
            </button>
            <button id="btn-absen-pulang" onclick="triggerUpload('PULANG')" class="p-6 bg-white border-2 border-slate-100 rounded-[2rem] flex justify-between items-center">
                <span id="txt-pulang" class="font-bold">Absen Pulang</span><i data-lucide="log-out" class="text-orange-500"></i>
            </button>
          </div>
          <input type="file" id="universal-upload" accept="image/*" class="hidden" onchange="processUpload(event)">
          <div class="space-y-4 pt-4 border-t border-slate-100">
            <h3 class="font-bold text-slate-800 flex items-center gap-2"><i data-lucide="clock" class="w-5 h-5 text-emerald-500"></i> Riwayat Hari Ini</h3>
            <div id="today-log" class="space-y-3"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="page-admin" class="hidden min-h-screen py-8 px-4 fade-in">
        <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm no-print">
              <h2 class="text-2xl font-extrabold text-slate-900">Panel Administrator</h2>
              <button onclick="logout()" class="px-5 py-2 bg-red-50 text-red-600 rounded-lg font-bold">Keluar</button>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 no-print">
                <select id="admin-filter-guru" onchange="renderAdminDetail()" class="p-4 bg-white border rounded-2xl outline-none"><option value="">Semua Guru</option></select>
                <select id="admin-filter-bulan" onchange="renderAdminDetail()" class="p-4 bg-white border rounded-2xl outline-none">
                    <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option><option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option><option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>
            <div class="flex justify-end mb-4 no-print"><button onclick="window.print()" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg">Cetak Laporan</button></div>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50"><tr><th class="p-4">No</th><th class="p-4">Nama</th><th class="p-4">Tanggal</th><th class="p-4 text-center">Masuk</th><th class="p-4 text-center">Pulang</th></tr></thead>
                    <tbody id="table-detail-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-success" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs p-8 rounded-[2.5rem] shadow-2xl text-center fade-in">
            <h3 class="text-2xl font-black text-slate-900">Berhasil!</h3>
            <p class="text-slate-500 mt-2 text-sm">Data absensi Anda telah disimpan.</p>
            <button onclick="closeModal()" class="w-full mt-6 py-4 bg-emerald-500 text-white font-bold rounded-2xl">OK</button>
        </div>
    </div>

  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxqlhMHviBkUnn-HtpRBN5-1mfF2zzsR4RlSE-_9nHlcOdHXz2Rc57OEGKcH8igLjtgA/exec";
    const MASTER_USERS = [{id:'admin',name:'Admin Sistem',role:'admin'},{id:'111321452',name:'Wilhelmina Kasih, S.Ag,S.Pd',role:'kepsek'},{id:'196706041991101001',name:'Ambrosius Sina, S.Pd',role:'guru'},{id:'196904212005012006',name:'Trifosa Rabe, S.Pd',role:'guru'},{id:'197301152000122002',name:'Priska Oni, S.Pd',role:'guru'},{id:'197007272000121007',name:'Flavianus V. Tumpung, S.Pd',role:'guru'},{id:'111321732',name:'Maria Junista Menge, S.Pd',role:'guru'},{id:'111321555',name:'Novi Mariana Loinati, S.Pd',role:'guru'},{id:'111321584',name:'Maria Yunita Lanus, S.Pd',role:'guru'},{id:'111321753',name:'Yohana Yusarli Nenobesi, S.Pd',role:'guru'},{id:'101',name:'Stefanus Leli, S.Pd',role:'guru'},{id:'102',name:'Yohanes Ignasius T. Deku (TU)',role:'pegawai'}];

    let currentUser = null, globalDatabase = [], currentMode = '';

    window.onload = async function() {
        const savedUser = localStorage.getItem('absen_user_session');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser.role === 'admin') { showPage('page-admin'); await renderAdminDetail(); } 
            else { showPage('page-guru'); await refreshGuruData(); }
        } else { showPage('page-login'); }
        lucide.createIcons();
    };

    async function fetchDatabase() {
        try { const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now()); globalDatabase = await res.json(); } catch (e) { console.error(e); }
    }

    async function refreshGuruData() {
        document.getElementById('user-name').textContent = currentUser.name;
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
        await fetchDatabase();
        const today = new Date().toISOString().split('T')[0];
        const myLogs = globalDatabase.filter(a => String(a.id_user) === String(currentUser.id) && String(a.date) === today);
        renderGuruDashboard(myLogs);
    }

    function renderGuruDashboard(myLogs) {
        updateButtonVisual('masuk', myLogs.find(l => l.status.includes('MASUK')));
        updateButtonVisual('pulang', myLogs.find(l => l.status.includes('PULANG')));
        const logContainer = document.getElementById('today-log');
        logContainer.innerHTML = myLogs.length ? myLogs.map(l => `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border border-slate-100"><div><p class="font-bold">Absen ${l.status}</p><p class="text-xs text-slate-400">${l.time}</p></div><i data-lucide="check-circle" class="text-emerald-500"></i></div>`).join('') : '<p class="text-center text-slate-400 italic text-sm py-4">Belum ada absen hari ini.</p>';
        lucide.createIcons();
    }

    function updateButtonVisual(type, data) {
        const btn = document.getElementById(`btn-absen-${type}`);
        const pill = document.getElementById(`status-${type}-pill`);
        if (data) {
            btn.disabled = true; btn.classList.add('opacity-70', 'bg-slate-100');
            document.getElementById(`txt-${type}`).textContent = `Selesai (${data.time})`;
            pill.textContent = `${type.toUpperCase()}: ${data.time}`;
        }
    }

    function triggerUpload(mode) { currentMode = mode; document.getElementById('universal-upload').click(); }

    async function processUpload(event) {
        const file = event.target.files[0]; if (!file) return;
        const btn = document.getElementById(`btn-absen-${currentMode.toLowerCase()}`);
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="loader"></span> Mengirim...';
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const payload = { id_user: String(currentUser.id), name: currentUser.name, date: new Date().toISOString().split('T')[0], time: new Date().toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit' }), status: currentMode, photo: e.target.result };
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('modal-success').classList.remove('hidden');
            } catch (err) { alert("Gagal!"); btn.innerHTML = originalText; btn.disabled = false; }
        };
        reader.readAsDataURL(file);
    }

    function closeModal() {
        document.getElementById('modal-success').classList.add('hidden');
        location.reload();
    }

    async function renderAdminDetail() {
        const selGuru = document.getElementById('admin-filter-guru');
        if (selGuru.options.length <= 1) MASTER_USERS.filter(u => u.role !== 'admin').forEach(u => { const opt = document.createElement('option'); opt.value = u.id; opt.textContent = u.name; selGuru.appendChild(opt); });
        
        await fetchDatabase();
        const selBulan = document.getElementById('admin-filter-bulan').value;
        const selGuruId = selGuru.value;
        const prefix = `${new Date().getFullYear()}-${selBulan}`;
        
        let filtered = globalDatabase.filter(d => d.date.startsWith(prefix));
        if(selGuruId) filtered = filtered.filter(d => String(d.id_user) === String(selGuruId));

        document.getElementById('table-detail-body').innerHTML = filtered.map((r, i) => `<tr><td class="p-4">${i+1}</td><td class="p-4 font-bold">${r.name}</td><td class="p-4">${r.date}</td><td class="p-4 text-center">${r.time.includes('-') ? r.time.split(' - ')[0] : (r.status.includes('MASUK') ? r.time : '-')}</td><td class="p-4 text-center">${r.time.includes('-') ? r.time.split(' - ')[1] : (r.status.includes('PULANG') ? r.time : '-')}</td></tr>`).join('');
    }

    function handleLogin() {
        const id = document.getElementById('login-id').value.trim(), role = document.getElementById('login-role').value;
        const user = MASTER_USERS.find(u => String(u.id) === id && u.role === role);
        if (user) { localStorage.setItem('absen_user_session', JSON.stringify(user)); location.reload(); } else alert("Gagal!");
    }
    function logout() { localStorage.removeItem('absen_user_session'); location.reload(); }
    function showPage(id) { document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); lucide.createIcons(); }
  </script>
</body>
</html>
