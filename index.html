<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absensi SDK St.Yoseph Kuaputu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Loader Spinner */
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

  <div id="app" class="flex-1 w-full relative">
    
    <div id="page-login" class="hidden min-h-screen flex items-center justify-center p-4 fade-in">
      <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
        <div class="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
          <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900">SDK St.Yoseph Kuaputu</h1>
        <p class="text-slate-500 mt-2 mb-8 uppercase tracking-widest text-xs font-bold">Sistem Absensi Foto</p>
        <div class="space-y-5 text-left">
          <select id="login-role" class="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none font-medium text-slate-700 border-slate-200">
            <option value="guru">Guru</option>
            <option value="kepsek">Kepala Sekolah</option>
            <option value="admin">Administrator</option>
          </select>
          <input id="login-id" type="text" placeholder="Masukkan NIP / Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-emerald-500">
          <button onclick="handleLogin()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95">MASUK SISTEM</button>
        </div>
      </div>
    </div>

    <div id="page-guru" class="hidden min-h-screen py-6 px-4 fade-in">
      <div class="max-w-md mx-auto bg-white min-h-[85vh] rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden">
        <header class="p-6 flex items-center justify-between border-b bg-white sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100"><i data-lucide="user" class="w-6 h-6 text-emerald-600"></i></div>
            <div>
                <h2 id="user-name" class="font-bold text-slate-900 leading-tight truncate w-32 uppercase">Memuat...</h2>
                <p id="user-role-label" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">GURU</p>
            </div>
          </div>
          <button onclick="logout()" class="p-3 rounded-2xl bg-red-50 text-red-500 active:scale-90"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>
        
        <main class="flex-1 px-6 pt-6 pb-24 space-y-6">
          <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-6 rounded-[2rem] text-white shadow-xl">
            <p id="current-date" class="font-bold text-emerald-400 text-sm">...</p>
            <h3 class="text-xl font-extrabold mt-1">Halo, Selamat Bekerja!</h3>
            <div class="mt-4 flex gap-2">
              <span id="status-masuk-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Masuk: -</span>
              <span id="status-pulang-pill" class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 uppercase">Pulang: -</span>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-4">
            <button id="btn-absen-masuk" onclick="triggerUpload('MASUK')" class="p-6 bg-white border-2 border-slate-100 rounded-[2rem] text-left flex justify-between items-center hover:border-emerald-500 transition-all active:scale-95">
              <div><h3 class="font-bold text-slate-900 text-lg">Absen Masuk</h3><p id="label-masuk" class="text-xs text-slate-500 font-medium">Upload foto absen masuk</p></div>
              <div id="icon-masuk" class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center"><i data-lucide="log-in"></i></div>
            </button>
            <button id="btn-absen-pulang" onclick="triggerUpload('PULANG')" class="p-6 bg-white border-2 border-slate-100 rounded-[2rem] text-left flex justify-between items-center hover:border-orange-500 transition-all active:scale-95">
              <div><h3 class="font-bold text-slate-900 text-lg">Absen Pulang</h3><p id="label-pulang" class="text-xs text-slate-500 font-medium">Upload foto absen pulang</p></div>
              <div id="icon-pulang" class="w-12 h-12 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center"><i data-lucide="log-out"></i></div>
            </button>
          </div>

          <input type="file" id="universal-upload" accept="image/*" class="hidden" onchange="processUpload(event)">

          <div class="space-y-4 pt-4 border-t border-slate-100">
            <h3 class="font-bold text-slate-800 flex items-center gap-2 text-lg"><i data-lucide="clock-3" class="w-5 h-5 text-emerald-500"></i> Riwayat Hari Ini</h3>
            <div id="today-log" class="space-y-3">
                <p class="text-center text-slate-400 italic text-sm py-4">Memperbarui riwayat...</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div id="modal-success" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs p-8 rounded-[2.5rem] shadow-2xl text-center fade-in">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="badge-check" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-900">Berhasil!</h3>
            <p class="text-slate-500 mt-2 text-sm leading-relaxed">Data absensi Anda telah berhasil disimpan ke server.</p>
            <button onclick="closeModal()" class="w-full mt-6 py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all">TUTUP</button>
        </div>
    </div>

    <div id="page-admin" class="hidden min-h-screen py-8 px-4 fade-in">
        </div>

  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxqlhMHviBkUnn-HtpRBN5-1mfF2zzsR4RlSE-_9nHlcOdHXz2Rc57OEGKcH8igLjtgA/exec";
    
    const MASTER_USERS = [
      { id: 'admin', name: 'Admin Sistem', role: 'admin' },
      { id: '111321452', name: 'Wilhelmina Kasih, S.Ag,S.Pd', role: 'kepsek' },
      { id: '196706041991101001', name: 'Ambrosius Sina, S.Pd', role: 'guru' },
      { id: '196904212005012006', name: 'Trifosa Rabe, S.Pd', role: 'guru' },
      { id: '197301152000122002', name: 'Priska Oni, S.Pd', role: 'guru' },
      { id: '197007272000121007', name: 'Flavianus V. Tumpung, S.Pd', role: 'guru' },
      { id: '111321732', name: 'Maria Junista Menge, S.Pd', role: 'guru' },
      { id: '111321555', name: 'Novi Mariana Loinati, S.Pd', role: 'guru' },
      { id: '111321584', name: 'Maria Yunita Lanus, S.Pd', role: 'guru' },
      { id: '111321753', name: 'Yohana Yusarli Nenobesi, S.Pd', role: 'guru' },
      { id: '101', name: 'Stefanus Leli, S.Pd', role: 'guru' },
      { id: '102', name: 'Yohanes Ignasius T. Deku (TU)', role: 'pegawai' }
    ];

    let currentUser = null;
    let globalDatabase = [];
    let currentMode = '';

    window.onload = async function() {
      const savedUser = localStorage.getItem('absen_user_session');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        if (currentUser.role === 'admin') {
            showPage('page-admin');
        } else {
            showPage('page-guru');
            await refreshGuruData();
        }
      } else { showPage('page-login'); }
      lucide.createIcons();
    };

    async function fetchDatabase() {
      try { 
        const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now()); 
        globalDatabase = await res.json(); 
      } catch (e) { console.error("Gagal memuat database:", e); }
    }

    async function refreshGuruData() {
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
      
      await fetchDatabase();
      const today = new Date().toISOString().split('T')[0];
      const myLogs = globalDatabase.filter(a => String(a.id_user) === String(currentUser.id) && String(a.date).includes(today));
      
      renderGuruDashboard(myLogs);
    }

    function renderGuruDashboard(myLogs) {
      updateButtonVisual('masuk', myLogs.find(l => l.status.includes('MASUK')));
      updateButtonVisual('pulang', myLogs.find(l => l.status.includes('PULANG')));
      
      const logContainer = document.getElementById('today-log');
      if (myLogs.length > 0) {
        logContainer.innerHTML = myLogs.map(l => `
          <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
            <div class="w-10 h-10 rounded-xl ${l.status.includes('MASUK') ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'} flex items-center justify-center font-black text-xs">${l.status[0]}</div>
            <div class="flex-1">
              <p class="font-bold text-slate-800 text-sm">Absen ${l.status}</p>
              <p class="text-[10px] text-slate-400 font-black uppercase">${l.time} WITA</p>
            </div>
            <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500"></i>
          </div>
        `).join('');
      } else {
        logContainer.innerHTML = `<p class="text-center text-slate-400 italic text-sm py-4">Belum ada absen hari ini.</p>`;
      }
      lucide.createIcons();
    }

    function updateButtonVisual(type, data) {
      const btn = document.getElementById(`btn-absen-${type}`);
      const label = document.getElementById(`label-${type}`);
      const icon = document.getElementById(`icon-${type}`);
      const pill = document.getElementById(`status-${type}-pill`);

      if (data) {
        btn.disabled = true;
        btn.classList.add('opacity-70', 'bg-slate-50');
        label.innerHTML = `<span class="text-emerald-600 font-black uppercase text-[10px]">Pukul ${data.time}</span>`;
        icon.innerHTML = `<i data-lucide="check" class="w-6 h-6 text-white"></i>`;
        icon.className = "w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg";
        pill.textContent = `${type.toUpperCase()}: ${data.time}`;
      }
    }

    function triggerUpload(mode) { 
      currentMode = mode; 
      document.getElementById('universal-upload').click(); 
    }

    async function processUpload(event) {
      const file = event.target.files[0]; 
      if (!file) return;

      const btn = document.getElementById(`btn-absen-${currentMode.toLowerCase()}`);
      const oldHTML = btn.innerHTML;
      btn.innerHTML = `<div class="flex items-center gap-3"><div><div class="loader"></div></div><div><h3 class="font-bold text-slate-900 text-lg">Mengirim...</h3></div></div>`;
      btn.disabled = true;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const payload = { 
          id_user: String(currentUser.id), 
          name: currentUser.name, 
          date: new Date().toISOString().split('T')[0], 
          time: new Date().toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit' }), 
          status: currentMode, 
          photo: e.target.result 
        };

        try {
          // Menggunakan fetch ke script google
          await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
          
          // Munculkan Pop-up Berhasil
          document.getElementById('modal-success').classList.remove('hidden');
          
        } catch (err) {
          alert("Gagal mengirim absen. Silakan coba lagi.");
          btn.innerHTML = oldHTML;
          btn.disabled = false;
        }
      };
      reader.readAsDataURL(file);
    }

    function closeModal() {
        document.getElementById('modal-success').classList.add('hidden');
        // Refresh data profil tanpa reload halaman
        refreshGuruData();
        // Reset input file agar bisa pilih file yang sama jika perlu
        document.getElementById('universal-upload').value = "";
    }

    function handleLogin() {
      const id = document.getElementById('login-id').value.trim();
      const role = document.getElementById('login-role').value;
      const user = MASTER_USERS.find(u => String(u.id) === id && u.role === role);
      if (user) { 
        localStorage.setItem('absen_user_session', JSON.stringify(user)); 
        location.reload(); 
      } else alert("Login Gagal! Periksa NIP/ID dan Peran.");
    }

    function logout() { localStorage.removeItem('absen_user_session'); location.reload(); }

    function showPage(id) { 
      document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden')); 
      document.getElementById(id).classList.remove('hidden'); 
      lucide.createIcons();
    }
  </script>
</body>
</html>
